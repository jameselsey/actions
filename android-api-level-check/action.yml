name: 'Android API Level Check'
description: >
  Checks Android targetSdk and compileSdk against the latest stable SDK level
  fetched live from the Android SDK repository. No config file required for
  the SDK requirement — it is always current automatically.

inputs:
  build-gradle-path:
    description: 'Path to the app build.gradle.kts file'
    required: false
    default: 'app/build.gradle.kts'
  warning-levels-behind:
    description: 'Number of SDK levels behind latest before a warning is raised (default: 1 = warn if not on latest)'
    required: false
    default: '1'

outputs:
  status:
    description: 'Compliance status: compliant, warning, or critical'
    value: ${{ steps.check.outputs.status }}
  message:
    description: 'Human-readable status message'
    value: ${{ steps.check.outputs.message }}
  color:
    description: 'Discord embed color for the status'
    value: ${{ steps.check.outputs.color }}
  fields:
    description: 'JSON array of Discord embed fields describing the compliance state'
    value: ${{ steps.check.outputs.fields }}
  target_sdk:
    description: 'Current targetSdkVersion'
    value: ${{ steps.check.outputs.target_sdk }}
  compile_sdk:
    description: 'Current compileSdkVersion'
    value: ${{ steps.check.outputs.compile_sdk }}
  latest_sdk:
    description: 'Latest stable Android SDK level fetched from the SDK repository'
    value: ${{ steps.check.outputs.latest_sdk }}

runs:
  using: 'composite'
  steps:
    - name: Check API level compliance
      id: check
      shell: bash
      run: |
        BUILD_FILE="${{ inputs.build-gradle-path }}"
        WARNING_LEVELS_BEHIND="${{ inputs.warning-levels-behind }}"

        # --- Extract SDK versions from build file ---
        if [ ! -f "$BUILD_FILE" ]; then
          echo "❌ Build file not found: $BUILD_FILE"
          exit 1
        fi

        COMPILE_SDK=$(grep -E '^\s*compileSdk\s*=' "$BUILD_FILE" | grep -oE '[0-9]+' | head -1)
        TARGET_SDK=$(grep -E '^\s*targetSdk\s*=' "$BUILD_FILE" | grep -oE '[0-9]+' | head -1)

        if [ -z "$COMPILE_SDK" ] || [ -z "$TARGET_SDK" ]; then
          echo "❌ Failed to extract SDK versions from $BUILD_FILE"
          exit 1
        fi

        echo "📱 compileSdk=$COMPILE_SDK  targetSdk=$TARGET_SDK"

        # --- Fetch latest stable SDK level from Android SDK repository ---
        echo "🌐 Fetching latest stable SDK level..."
        LATEST_SDK=$(curl -s --max-time 15 \
          "https://dl.google.com/android/repository/repository2-3.xml" \
          | grep -oE '<api-level>[0-9]+</api-level>' \
          | grep -oE '[0-9]+' \
          | sort -n | tail -1)

        if [ -z "$LATEST_SDK" ]; then
          echo "⚠️ Could not fetch latest SDK level — skipping SDK check"
          LATEST_SDK="$COMPILE_SDK"
        fi

        echo "📡 Latest stable SDK: $LATEST_SDK"

        # --- Determine status ---
        # Rule 1: targetSdk must equal compileSdk (misconfiguration if they differ)
        # Rule 2: compileSdk should be within WARNING_LEVELS_BEHIND of latest stable
        LEVELS_BEHIND=$(( LATEST_SDK - COMPILE_SDK ))

        if [ "$TARGET_SDK" -ne "$COMPILE_SDK" ]; then
          STATUS="critical"
          MESSAGE="❌ CRITICAL: targetSdk ($TARGET_SDK) does not match compileSdk ($COMPILE_SDK)"
          COLOR="16744272"
        elif [ "$LEVELS_BEHIND" -gt "$WARNING_LEVELS_BEHIND" ]; then
          STATUS="critical"
          MESSAGE="❌ CRITICAL: SDK is $LEVELS_BEHIND level(s) behind latest ($LATEST_SDK)"
          COLOR="16744272"
        elif [ "$LEVELS_BEHIND" -gt 0 ]; then
          STATUS="warning"
          MESSAGE="⚠️ WARNING: SDK is $LEVELS_BEHIND level(s) behind latest ($LATEST_SDK)"
          COLOR="16776960"
        else
          STATUS="compliant"
          MESSAGE="✅ SDK up to date (API $TARGET_SDK)"
          COLOR="3066993"
        fi

        echo "📊 Status: $STATUS — $MESSAGE"

        # --- Build Discord fields ---
        if [ "$STATUS" = "compliant" ]; then
          DETAIL=$(jq -n \
            --arg sdk "$TARGET_SDK" \
            --arg latest "$LATEST_SDK" \
            '"• targetSdk: " + $sdk + "\n• compileSdk: " + $sdk + "\n• Latest stable: " + $latest')
        else
          DETAIL=$(jq -n \
            --arg target "$TARGET_SDK" \
            --arg compile "$COMPILE_SDK" \
            --arg latest "$LATEST_SDK" \
            --arg behind "$LEVELS_BEHIND" \
            '"• targetSdk: " + $target + "\n• compileSdk: " + $compile + "\n• Latest stable: " + $latest + "\n• Levels behind: " + $behind')
        fi

        FIELDS=$(jq -n \
          --arg msg "$MESSAGE" \
          --argjson detail "$DETAIL" \
          '[{"name": "📱 API Level", "value": ($msg + "\n" + $detail), "inline": false}]')

        # --- Set outputs ---
        echo "status=$STATUS" >> $GITHUB_OUTPUT
        echo "message=$MESSAGE" >> $GITHUB_OUTPUT
        echo "color=$COLOR" >> $GITHUB_OUTPUT
        echo "target_sdk=$TARGET_SDK" >> $GITHUB_OUTPUT
        echo "compile_sdk=$COMPILE_SDK" >> $GITHUB_OUTPUT
        echo "latest_sdk=$LATEST_SDK" >> $GITHUB_OUTPUT
        {
          echo 'fields<<EOF'
          echo "$FIELDS"
          echo 'EOF'
        } >> $GITHUB_OUTPUT

        echo "✅ API level check complete: $STATUS"
