name: 'AWS Static Site Deploy'
description: >
  Deploys a pre-built static site to an S3 bucket and invalidates the CloudFront distribution cache.
  Assumes the caller has already configured AWS credentials (e.g. via aws-actions/configure-aws-credentials).

inputs:
  build-path:
    description: 'Absolute or relative path to the directory containing the built static files to upload'
    required: true
  s3-bucket:
    description: 'Name of the S3 bucket to sync files into'
    required: true
  cloudfront-distribution-id:
    description: 'CloudFront distribution ID to invalidate after upload'
    required: true
  s3-prefix:
    description: 'Optional key prefix (folder) within the S3 bucket to sync into'
    required: false
    default: ''
  cache-control-html:
    description: 'Cache-Control header value applied to .html files'
    required: false
    default: 'max-age=300, must-revalidate'
  cache-control-assets:
    description: 'Cache-Control header value applied to all other files (JS, CSS, images, fonts, etc.)'
    required: false
    default: 'max-age=86400, immutable'

runs:
  using: 'composite'
  steps:
    - name: Validate build path
      shell: bash
      run: |
        BUILD_PATH="${{ inputs.build-path }}"
        if [ ! -d "$BUILD_PATH" ]; then
          echo "❌ Build path '$BUILD_PATH' does not exist or is not a directory"
          exit 1
        fi
        FILE_COUNT=$(find "$BUILD_PATH" -type f | wc -l | tr -d ' ')
        echo "✅ Build path validated: $FILE_COUNT file(s) found in '$BUILD_PATH'"

    - name: Sync HTML files to S3
      shell: bash
      run: |
        BUILD_PATH="${{ inputs.build-path }}"
        BUCKET="${{ inputs.s3-bucket }}"
        PREFIX="${{ inputs.s3-prefix }}"
        DEST="s3://${BUCKET}"
        [ -n "$PREFIX" ] && DEST="${DEST}/${PREFIX}"

        echo "🚀 Syncing HTML files to $DEST..."
        aws s3 sync "$BUILD_PATH" "$DEST" \
          --exclude "*" \
          --include "*.html" \
          --cache-control "${{ inputs.cache-control-html }}" \
          --delete
        echo "✅ HTML files synced"

    - name: Sync static assets to S3
      shell: bash
      run: |
        BUILD_PATH="${{ inputs.build-path }}"
        BUCKET="${{ inputs.s3-bucket }}"
        PREFIX="${{ inputs.s3-prefix }}"
        DEST="s3://${BUCKET}"
        [ -n "$PREFIX" ] && DEST="${DEST}/${PREFIX}"

        echo "🚀 Syncing static assets to $DEST..."
        aws s3 sync "$BUILD_PATH" "$DEST" \
          --exclude "*.html" \
          --cache-control "${{ inputs.cache-control-assets }}" \
          --delete
        echo "✅ Static assets synced"

    - name: Invalidate CloudFront cache
      shell: bash
      run: |
        DISTRIBUTION_ID="${{ inputs.cloudfront-distribution-id }}"
        echo "🔄 Invalidating CloudFront distribution: $DISTRIBUTION_ID"
        INVALIDATION_ID=$(aws cloudfront create-invalidation \
          --distribution-id "$DISTRIBUTION_ID" \
          --paths "/*" \
          --query 'Invalidation.Id' \
          --output text)
        echo "✅ Invalidation created: $INVALIDATION_ID"
        echo "⏳ Waiting for invalidation to complete..."
        aws cloudfront wait invalidation-completed \
          --distribution-id "$DISTRIBUTION_ID" \
          --id "$INVALIDATION_ID"
        echo "✅ CloudFront cache invalidated"
