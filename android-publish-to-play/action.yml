name: 'Android Publish to Play'
description: 'Publish a signed AAB to a Google Play track using a service account'

inputs:
  service-account-json:
    description: 'Google Play service account JSON (plain text, store as a repository secret)'
    required: true
  package-name:
    description: 'Android app package name, e.g. com.example.myapp'
    required: true
  aab-path:
    description: 'Path to the signed AAB file to publish'
    required: true
  track:
    description: 'Google Play track: internal, alpha, beta, or production'
    required: false
    default: 'internal'
  release-status:
    description: 'Release status: completed, draft, halted, or inProgress'
    required: false
    default: 'completed'
  whats-new:
    description: 'Release notes as plain text. Leave empty to publish without release notes.'
    required: false
    default: ''

outputs:
  track:
    description: 'The Google Play track that was published to'
    value: ${{ steps.set-output.outputs.track }}

runs:
  using: 'composite'
  steps:
    - name: Prepare release notes
      shell: bash
      run: |
        mkdir -p /tmp/whatsnew
        printf '%s' "${{ inputs.whats-new }}" > /tmp/whatsnew/whatsnew-en-US
        if [ -n "${{ inputs.whats-new }}" ]; then
          echo "✅ Release notes written"
        else
          echo "ℹ️ No release notes provided"
        fi

    - name: Publish AAB to Google Play
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ inputs.service-account-json }}
        packageName: ${{ inputs.package-name }}
        releaseFiles: ${{ inputs.aab-path }}
        track: ${{ inputs.track }}
        status: ${{ inputs.release-status }}
        whatsNewDirectory: /tmp/whatsnew

    - name: Set output
      id: set-output
      shell: bash
      run: |
        echo "track=${{ inputs.track }}" >> $GITHUB_OUTPUT
        echo "✅ Published to track: ${{ inputs.track }}"
